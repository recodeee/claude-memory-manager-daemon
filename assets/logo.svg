<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="claude-memory-manager-daemon">
  <title>claude-memory-manager-daemon</title>

  <!-- Rounded dark badge -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="#0E0E0E"/>

  <!-- Claude-style sparkle: 8 lens-shaped petals radiating from center.
       Solid fills (no gradients) for maximum renderer compatibility. -->
  <g transform="translate(128 128)" fill="#D97757">
    <path d="M 0,-92 Q 9,-28 0,0 Q -9,-28 0,-92 Z"/>
    <g transform="rotate(45)">  <path d="M 0,-72 Q 7,-22 0,0 Q -7,-22 0,-72 Z"/></g>
    <g transform="rotate(90)">  <path d="M 0,-92 Q 9,-28 0,0 Q -9,-28 0,-92 Z"/></g>
    <g transform="rotate(135)"> <path d="M 0,-72 Q 7,-22 0,0 Q -7,-22 0,-72 Z"/></g>
    <g transform="rotate(180)"> <path d="M 0,-92 Q 9,-28 0,0 Q -9,-28 0,-92 Z"/></g>
    <g transform="rotate(225)"> <path d="M 0,-72 Q 7,-22 0,0 Q -7,-22 0,-72 Z"/></g>
    <g transform="rotate(270)"> <path d="M 0,-92 Q 9,-28 0,0 Q -9,-28 0,-92 Z"/></g>
    <g transform="rotate(315)"> <path d="M 0,-72 Q 7,-22 0,0 Q -7,-22 0,-72 Z"/></g>
  </g>

  <!-- Small green status pip (the daemon-is-up indicator) -->
  <circle cx="208" cy="48" r="12" fill="#7BD389"/>
  <circle cx="208" cy="48" r="4"  fill="#FFFFFF"/>
</svg>
